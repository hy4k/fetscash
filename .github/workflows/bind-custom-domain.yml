name: Bind custom domain (fets.cash)

on:
  workflow_dispatch: {}

jobs:
  bind-domain:
    name: Add and bind custom hostnames
    runs-on: ubuntu-24.04
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure login (service principal)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Add custom hostnames via REST API
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          APP_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/rg-staging/providers/Microsoft.App/containerApps/ca-fetscash-axojf7v4ky4xo?api-version=2023-05-01"

          # Get current container app config
          CURRENT=$(az rest --method GET --url "$APP_URL")
          echo "Current config retrieved."

          # Inject custom domains with bindingType=Disabled (triggers managed cert issuance)
          UPDATED=$(echo "$CURRENT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          ingress = data['properties']['configuration']['ingress']
          if not ingress.get('customDomains'):
              ingress['customDomains'] = []
          existing = {d['name'] for d in ingress['customDomains']}
          for hostname in ['fets.cash', 'paybook.fets.cash']:
              if hostname not in existing:
                  ingress['customDomains'].append({
                      'name': hostname,
                      'bindingType': 'Disabled'
                  })
                  print(f'Adding: {hostname}', file=__import__('sys').stderr)
              else:
                  print(f'Already present: {hostname}', file=__import__('sys').stderr)
          # ARM GET redacts secret values; omit secrets key so Azure preserves existing ones
          config = data['properties']['configuration']
          config.pop('secrets', None)
          print(json.dumps(data))
          ")

          # PATCH the container app
          az rest --method PATCH --url "$APP_URL" --body "$UPDATED" \
            --headers "Content-Type=application/json"
          echo "Custom domains added with bindingType=Disabled."
          echo "Azure will issue managed TLS certificates via HTTP validation automatically."

      - name: Wait for certificate issuance (up to 5 min)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          APP_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/rg-staging/providers/Microsoft.App/containerApps/ca-fetscash-axojf7v4ky4xo?api-version=2023-05-01"
          for i in $(seq 1 30); do
            STATUS=$(az rest --method GET --url "$APP_URL" | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          domains = data['properties']['configuration']['ingress'].get('customDomains', [])
          for d in domains:
              print(d['name'], d.get('bindingType','?'))
              ")
            echo "poll $i: $STATUS"
            if echo "$STATUS" | grep -q "SniEnabled"; then
              echo "TLS certificate bound successfully!"
              break
            fi
            sleep 10
          done

      - name: Show final hostname status
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az rest --method GET \
            --url "https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/rg-staging/providers/Microsoft.App/containerApps/ca-fetscash-axojf7v4ky4xo?api-version=2023-05-01" | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          domains = data['properties']['configuration']['ingress'].get('customDomains', [])
          print('--- Custom Domains ---')
          for d in domains:
              print(f\"  {d['name']}  binding={d.get('bindingType','?')}\")
          if not domains:
              print('  (none)')
          "
