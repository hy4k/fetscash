    <style>
        body {
            background-color: #0c1410;
            color: #e8f5e9;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #16231d 0%, #0c1410 100%);
        }
        
        /* Noise Texture for Paper Feel */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 50;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(22, 35, 29, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(133, 187, 101, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        /* Neomorphism Button (Extruded) */
        .neo-btn {
            background: #16231d;
            box-shadow: 6px 6px 12px #0c1310, -6px -6px 12px #20332a;
            border: 1px solid rgba(133, 187, 101, 0.05);
            transition: all 0.2s ease-in-out;
        }
        .neo-btn:active {
            box-shadow: inset 4px 4px 8px #0c1310, inset -4px -4px 8px #20332a;
            transform: translateY(1px);
        }
        .neo-btn:hover {
            box-shadow: 8px 8px 16px #0c1310, -8px -8px 16px #20332a;
            transform: translateY(-1px);
        }
        .neo-btn.active {
             box-shadow: inset 4px 4px 8px #0c1310, inset -4px -4px 8px #20332a;
             color: #85bb65;
             border-color: rgba(133, 187, 101, 0.2);
        }

        /* Neomorphism Input (Inset) */
        .neo-input {
            background: #131f19;
            box-shadow: inset 4px 4px 8px #0a110d, inset -4px -4px 8px #1c2d25;
            border: none;
            color: #e8f5e9;
            transition: all 0.3s ease;
        }
        .neo-input:focus {
            box-shadow: inset 6px 6px 12px #0a110d, inset -6px -6px 12px #1c2d25;
            outline: none;
            border: 1px solid rgba(133, 187, 101, 0.3);
        }

        /* Metallic/Engraved Text Effect */
        .engraved-text {
            font-family: 'Cinzel Decorative', cursive;
            background: linear-gradient(to bottom, #cfc09f 22%, #634f2c 24%, #cfc09f 26%, #cfc09f 27%, #ffecb3 40%, #3a2c0f 78%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            color: #fff;
            position: relative;
            text-shadow: 0px 1px 0px rgba(255,255,255,0.2);
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0c1410; }
        ::-webkit-scrollbar-thumb { background: #20332a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #85bb65; }

        /* Chart Tooltip Customization */
        .recharts-tooltip-cursor { fill: rgba(133, 187, 101, 0.05) !important; }
