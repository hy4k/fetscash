name: Bind custom domain (fets.cash)

on:
  workflow_dispatch: {}

jobs:
  bind-domain:
    name: Add and bind custom hostnames
    runs-on: ubuntu-24.04
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure login (service principal)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Re-register fets.cash (force fresh validation)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          APP_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/rg-staging/providers/Microsoft.App/containerApps/ca-fetscash-axojf7v4ky4xo?api-version=2023-05-01"

          CURRENT=$(az rest --method GET --url "$APP_URL")
          echo "Config retrieved."

          # Step 1: Remove fets.cash to reset validation state
          REMOVED=$(echo "$CURRENT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          ingress = data['properties']['configuration']['ingress']
          ingress['customDomains'] = [d for d in (ingress.get('customDomains') or []) if d['name'] != 'fets.cash']
          data['properties']['configuration'].pop('secrets', None)
          print(json.dumps(data))
          ")
          az rest --method PATCH --url "$APP_URL" --body "$REMOVED" \
            --headers "Content-Type=application/json"
          echo "Removed fets.cash. Waiting for provisioning to complete..."

          # Wait until provisioningState is not InProgress
          for i in $(seq 1 30); do
            STATE=$(az rest --method GET --url "$APP_URL" | python3 -c "
          import json,sys; d=json.load(sys.stdin)
          print(d['properties'].get('provisioningState',''))
            ")
            echo "  provisioning: $STATE"
            [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ] && break
            sleep 10
          done

          # Step 2: Re-add fets.cash with Disabled binding (triggers fresh cert validation)
          CURRENT2=$(az rest --method GET --url "$APP_URL")
          ADDED=$(echo "$CURRENT2" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          ingress = data['properties']['configuration']['ingress']
          if not ingress.get('customDomains'):
              ingress['customDomains'] = []
          ingress['customDomains'].append({'name': 'fets.cash', 'bindingType': 'Disabled'})
          data['properties']['configuration'].pop('secrets', None)
          print(json.dumps(data))
          ")
          az rest --method PATCH --url "$APP_URL" --body "$ADDED" \
            --headers "Content-Type=application/json"
          echo "Re-added fets.cash. Azure will now validate DNS and issue TLS cert."

      - name: "NOTE: paybook.fets.cash DNS prerequisite"
        run: |
          echo "paybook.fets.cash is skipped until its verification TXT record is added:"
          echo "  Type: TXT  |  Name: asuid.paybook  |  TTL: 300"
          echo "  Value: 6E5EDF6D86B72205B9E60EF1ECD706BD643F3EF3EA7D9B78C5F3FFDE6BCE9D92"

      - name: Wait for certificate issuance (up to 5 min)
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          APP_URL="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/rg-staging/providers/Microsoft.App/containerApps/ca-fetscash-axojf7v4ky4xo?api-version=2023-05-01"
          for i in $(seq 1 30); do
            STATUS=$(az rest --method GET --url "$APP_URL" | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          domains = data['properties']['configuration']['ingress'].get('customDomains') or []
          for d in domains:
              print(d['name'], d.get('bindingType','?'))
              ")
            echo "poll $i: $STATUS"
            if echo "$STATUS" | grep -q "SniEnabled"; then
              echo "TLS certificate bound successfully!"
              break
            fi
            sleep 10
          done

      - name: Show final hostname status
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az rest --method GET \
            --url "https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/rg-staging/providers/Microsoft.App/containerApps/ca-fetscash-axojf7v4ky4xo?api-version=2023-05-01" | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          domains = data['properties']['configuration']['ingress'].get('customDomains') or []
          print('--- Custom Domains ---')
          for d in domains:
              print(f\"  {d['name']}  binding={d.get('bindingType','?')}\")
          if not domains:
              print('  (none)')
          "
