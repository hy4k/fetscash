name: Bind custom domain (fets.cash)

on:
  workflow_dispatch: {}

jobs:
  bind-domain:
    name: Add and bind custom hostnames
    runs-on: ubuntu-24.04
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Azure login (service principal)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Verify static IP matches DNS
        run: |
          STATIC_IP=$(az containerapp env show \
            --name caeaxojf7v4ky4xo \
            --resource-group rg-staging \
            --query properties.staticIp -o tsv)
          echo "Container Apps environment static IP: $STATIC_IP"
          echo "Expected: 48.214.86.64"
          if [ "$STATIC_IP" != "48.214.86.64" ]; then
            echo "::warning::IP mismatch! Update your DNS A records to $STATIC_IP"
          else
            echo "IP matches DNS records."
          fi

      - name: Add hostname fets.cash
        run: |
          az containerapp hostname add \
            --hostname fets.cash \
            --name ca-fetscash-axojf7v4ky4xo \
            --resource-group rg-staging || echo "Hostname may already exist, continuing..."

      - name: Bind managed TLS certificate for fets.cash
        run: |
          az containerapp hostname bind \
            --hostname fets.cash \
            --name ca-fetscash-axojf7v4ky4xo \
            --resource-group rg-staging \
            --environment caeaxojf7v4ky4xo \
            --validation-method HTTP

      - name: Add hostname paybook.fets.cash
        run: |
          az containerapp hostname add \
            --hostname paybook.fets.cash \
            --name ca-fetscash-axojf7v4ky4xo \
            --resource-group rg-staging || echo "Hostname may already exist, continuing..."

      - name: Bind managed TLS certificate for paybook.fets.cash
        run: |
          az containerapp hostname bind \
            --hostname paybook.fets.cash \
            --name ca-fetscash-axojf7v4ky4xo \
            --resource-group rg-staging \
            --environment caeaxojf7v4ky4xo \
            --validation-method HTTP

      - name: Show bound hostnames
        run: |
          az containerapp hostname list \
            --name ca-fetscash-axojf7v4ky4xo \
            --resource-group rg-staging \
            -o table
