name: Build and push frontend image

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/fetscash:${{ github.sha }}
          docker build -t $IMAGE -f Dockerfile .
          docker push $IMAGE
          # also push a 'latest' tag
          docker tag $IMAGE ${{ secrets.ACR_LOGIN_SERVER }}/fetscash:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/fetscash:latest
      - name: Write image reference and update Bicep parameters
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/fetscash:${{ github.sha }}
          echo "$IMAGE" > infra/latest_image.txt
          # update infra/parameters.staging.json containerRegistryEndpoint
          python - <<'PY'
import json
p='infra/parameters.staging.json'
data=json.load(open(p))
data['containerRegistryEndpoint']=open('infra/latest_image.txt').read().strip()
json.dump(data, open(p,'w'), indent=2)
print('Updated',p)
PY
          # commit the parameter change back to the repository (on the branch triggering this workflow)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/parameters.staging.json infra/latest_image.txt || true
          git commit -m "ci: update parameters.staging.json with built image" || true
          git push origin HEAD:refs/heads/${{ github.ref_name }} || true
